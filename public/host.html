<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Session Host Control</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg: #0f141b;
      --panel: #1a232f;
      --panel-soft: #111821;
      --text: #edf2f7;
      --muted: #96a2b5;
      --ok: #7ddc9a;
      --warn: #f8b84e;
      --danger: #ff8f8f;
      --line: #273446;
      --action: #7cc8ff;
      --action-2: #96f0c8;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      background: radial-gradient(circle at 15% 10%, #1d2a3a 0%, #0f141b 45%), #0f141b;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
      min-height: 100vh;
    }

    .wrap {
      max-width: 860px;
      margin: 32px auto;
      padding: 0 16px 28px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      letter-spacing: 0.02em;
    }

    .desc {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 14px;
    }

    .card {
      background: linear-gradient(145deg, var(--panel) 0%, var(--panel-soft) 100%);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .row {
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .value {
      color: var(--text);
      font-size: 16px;
      word-break: break-all;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 3px 10px;
      font-size: 12px;
      border: 1px solid transparent;
    }

    .pill.ok { color: var(--ok); border-color: #2e6843; background: #12281c; }
    .pill.warn { color: var(--warn); border-color: #6b5325; background: #2c2110; }

    .inline {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    button, select {
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #13202e;
      color: var(--text);
      padding: 8px 10px;
      font-size: 14px;
    }

    button {
      cursor: pointer;
      transition: transform 0.08s ease;
    }

    button:hover { transform: translateY(-1px); }

    .primary {
      border-color: #3b6f93;
      background: linear-gradient(140deg, var(--action) 0%, #4d85ae 100%);
      color: #0a1620;
      font-weight: 600;
    }

    .secondary {
      border-color: #3f6f5a;
      background: linear-gradient(140deg, var(--action-2) 0%, #6bc09f 100%);
      color: #0a1a14;
      font-weight: 600;
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
    }

    .msg {
      margin-top: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 13px;
      border: 1px solid transparent;
    }

    .msg.ok { color: var(--ok); border-color: #2e6843; background: #12281c; }
    .msg.err { color: var(--danger); border-color: #7a3838; background: #2d1717; }

    .link {
      color: #a6dcff;
      text-decoration: none;
    }

    @media (max-width: 680px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Host Control Panel</h1>
    <p class="desc">내부 운영자용 세션 공유 제어면입니다. 외부 viewer는 joinCode 링크로 read-only 접근만 가능합니다.</p>

    <div class="card">
      <div class="grid">
        <div>
          <div class="row">Session ID</div>
          <div id="session-id" class="value">-</div>
        </div>
        <div>
          <div class="row">Join Code</div>
          <div class="inline">
            <div id="join-code" class="value">-</div>
            <button id="copy-code">코드 복사</button>
          </div>
        </div>
      </div>

      <div class="row" style="margin-top: 12px;">Join URL</div>
      <div class="inline">
        <a id="join-url" class="value link" href="#">-</a>
        <button id="copy-url">링크 복사</button>
      </div>
      <div class="muted" style="margin-top: 8px;">공유 중이 아닐 때 외부 사용자는 not_shared 상태를 보게 됩니다.</div>
    </div>

    <div class="card">
      <div class="grid">
        <div>
          <div class="row">Share Enabled</div>
          <div id="share-pill" class="pill warn">OFF</div>
        </div>
        <div>
          <div class="row">Visibility</div>
          <div id="visibility-pill" class="pill warn">private</div>
        </div>
      </div>

      <div class="inline" style="margin-top: 12px;">
        <label class="muted" for="share-enabled">공유</label>
        <select id="share-enabled">
          <option value="false">OFF</option>
          <option value="true">ON</option>
        </select>

        <label class="muted" for="visibility">가시성</label>
        <select id="visibility">
          <option value="private">private</option>
          <option value="code">code</option>
        </select>

        <button id="save" class="primary">적용</button>
        <button id="reload" class="secondary">새로고침</button>
      </div>

      <div id="message"></div>
    </div>
  </div>

  <script src="/host.js"></script>
</body>
</html>
