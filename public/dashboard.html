<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F1 25 Local Pitwall Dashboard</title>
  <link rel="stylesheet" href="dashboard.css" />
  <link rel="stylesheet" href="/branding.css" />
</head>
<body>
  <div id="dashboard-root">
    <header>
      <h1>F1 25 Local Pitwall Dashboard</h1>
      <span id="connection-status" class="status">데이터 대기 중...</span>
    </header>
    <main id="main-layout">
      <section id="timing-board"></section>
      <section id="player-focus"></section>
      <section id="tyre-fuel-damage"></section>
      <section id="event-log"></section>
    </main>
    <footer>
      <span class="footer-note">Read-only | Local use only | 엔지니어링 대시보드</span>
      <button id="refresh-btn">Refresh</button>
      <span id="last-updated"></span>
    </footer>
  </div>
  <script src="/branding.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
