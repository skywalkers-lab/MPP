<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Remote F1 Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: sans-serif; background: #181c20; color: #eee; margin: 0; padding: 0; }
    .container { max-width: 600px; margin: 40px auto; background: #23272b; border-radius: 8px; box-shadow: 0 2px 8px #0008; padding: 24px; }
    .session-card { background: #222; border-radius: 6px; padding: 12px 16px; margin-bottom: 16px; }
    .status { font-weight: bold; }
    .snapshot-summary { background: #1a1d20; border-radius: 6px; padding: 12px; margin-bottom: 16px; }
    .event-log { background: #191b1e; border-radius: 6px; padding: 12px; }
    .event-log ul { margin: 0; padding-left: 20px; }
    .label { color: #aaa; font-size: 0.95em; }
    .value { color: #fff; font-size: 1.1em; }
    .error { color: #ff6b6b; }
  </style>
</head>
<body>
  <div class="container">
    <div id="session-card" class="session-card"></div>
    <div id="snapshot-summary" class="snapshot-summary"></div>
    <div id="event-log" class="event-log"></div>
  </div>
  <script src="/viewer.js"></script>
</body>
</html>
