<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>F1 Relay Overlay</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg: rgba(8, 12, 18, 0.93);
      --panel: rgba(18, 28, 40, 0.95);
      --text: #edf2f7;
      --muted: #96a2b5;
      --ok: #7ddc9a;
      --warn: #f8b84e;
      --danger: #ff8f8f;
      --action: #7cc8ff;
      --line: rgba(40, 55, 75, 0.8);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: transparent;
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif;
    }

    /* Main overlay container — fixed 500px wide for broadcast */
    .overlay {
      width: 500px;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    /* Header */
    .overlay-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 12px;
      background: rgba(12, 20, 30, 0.97);
      border-bottom: 1px solid var(--line);
      gap: 8px;
    }

    .brand {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--action);
      flex-shrink: 0;
    }

    .header-session {
      font-size: 10px;
      color: var(--muted);
      font-family: monospace;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Health chip */
    .health-chip {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid transparent;
      flex-shrink: 0;
    }
    .health-chip.healthy   { color: var(--ok);    border-color: #2e6843; background: #12281c; }
    .health-chip.delayed   { color: var(--warn);   border-color: #6b5325; background: #2c2110; }
    .health-chip.stale_risk{ color: #ff9f57;       border-color: #7a4d25; background: #2d1e0f; }
    .health-chip.stale     { color: var(--danger); border-color: #7b3939; background: #2c1818; }
    .health-chip.connecting{ color: var(--muted);  border-color: #3a4d60; background: #1a2333; }

    .health-bar {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      padding: 6px 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(11, 18, 27, 0.95);
    }

    .health-metric {
      font-size: 10px;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px 8px;
      background: #162131;
    }

    /* Stats row */
    .stats-row {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--line);
    }

    .stat-cell {
      flex: 1;
      padding: 10px 8px 8px;
      border-right: 1px solid var(--line);
      text-align: center;
    }
    .stat-cell:last-child { border-right: none; }

    .stat-label {
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.11em;
      text-transform: uppercase;
      color: var(--muted);
      display: block;
      margin-bottom: 3px;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      display: block;
      line-height: 1;
    }
    .stat-value.compound { font-size: 12px; padding-top: 5px; letter-spacing: 0.04em; }

    .stat-sub {
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
      display: block;
    }

    /* Tyre compound colors */
    .tyre-soft   { color: #ff7070; }
    .tyre-medium { color: var(--warn); }
    .tyre-hard   { color: var(--text); }
    .tyre-inter  { color: var(--ok); }
    .tyre-wet    { color: var(--action); }

    /* Strategy recommendation row */
    .rec-row {
      display: flex;
      align-items: center;
      padding: 10px 14px;
      gap: 10px;
      border-bottom: 1px solid var(--line);
      min-height: 46px;
    }

    .rec-label {
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.11em;
      text-transform: uppercase;
      color: var(--muted);
      flex-shrink: 0;
      width: 50px;
    }

    .rec-primary {
      font-size: 15px;
      font-weight: 700;
      color: var(--action);
      flex: 1;
      line-height: 1.2;
    }

    .rec-secondary {
      font-size: 11px;
      color: var(--muted);
      margin-left: 4px;
    }

    .rec-severity {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid transparent;
      flex-shrink: 0;
    }
    .rec-severity.critical { color: var(--danger); border-color: #7b3939; background: #2c1818; }
    .rec-severity.high     { color: #ff9f57;       border-color: #7a4d25; background: #2d1e0f; }
    .rec-severity.medium   { color: var(--warn);   border-color: #6b5325; background: #2c2110; }
    .rec-severity.low      { color: var(--ok);     border-color: #2e6843; background: #12281c; }
    .rec-severity.info     { color: var(--muted);  border-color: #3a4d60; background: #1a2333; }

    /* Footer */
    .overlay-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 12px;
      background: rgba(10, 16, 24, 0.95);
    }

    .footer-label {
      font-size: 9px;
      color: var(--muted);
      font-family: monospace;
    }

    /* Error state */
    .error-msg {
      padding: 16px;
      color: var(--danger);
      font-size: 12px;
      text-align: center;
    }

    /* Fullscreen mode info panel */
    .info-bar {
      background: rgba(14, 22, 33, 0.95);
      border-top: 1px solid var(--line);
      padding: 4px 12px;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }
    .info-bar a {
      font-size: 10px;
      color: var(--muted);
      text-decoration: none;
    }
    .info-bar a:hover { color: var(--action); }

    body[data-preset="broadcast"] .overlay {
      width: 540px;
      box-shadow: 0 12px 34px rgba(0, 0, 0, 0.48);
    }
  </style>
</head>
<body>
  <div class="overlay" id="overlay-root">
    <div class="overlay-header">
      <span class="brand">F1 Relay</span>
      <span class="header-session" id="header-session">connecting...</span>
      <span class="health-chip connecting" id="health-chip">CONNECTING</span>
    </div>

    <div class="health-bar" id="health-bar"></div>

    <div class="stats-row">
      <div class="stat-cell">
        <span class="stat-label">LAP</span>
        <span class="stat-value" id="stat-lap">-</span>
        <span class="stat-sub" id="stat-lap-total"></span>
      </div>
      <div class="stat-cell">
        <span class="stat-label">POS</span>
        <span class="stat-value" id="stat-pos">-</span>
      </div>
      <div class="stat-cell">
        <span class="stat-label">TYRE</span>
        <span class="stat-value compound" id="stat-tyre">-</span>
        <span class="stat-sub" id="stat-tyre-age"></span>
      </div>
      <div class="stat-cell">
        <span class="stat-label">FUEL (L)</span>
        <span class="stat-value" id="stat-fuel">-</span>
        <span class="stat-sub" id="stat-fuel-laps"></span>
      </div>
      <div class="stat-cell">
        <span class="stat-label">ERS</span>
        <span class="stat-value" id="stat-ers">-</span>
      </div>
    </div>

    <div class="rec-row">
      <span class="rec-label">Strategy</span>
      <span class="rec-primary" id="rec-primary">Awaiting data...</span>
      <span class="rec-secondary" id="rec-alt" style="display:none;"></span>
      <span class="rec-severity" id="rec-severity" style="display:none;"></span>
    </div>

    <div class="overlay-footer">
      <span class="footer-label" id="footer-session">-</span>
      <span class="footer-label" id="footer-updated">-</span>
    </div>

    <div class="info-bar">
      <a href="#" id="preset-indicator">preset</a>
      <a href="/ops" target="_blank">ops</a>
      <a href="/archives" target="_blank">archives</a>
    </div>
  </div>

  <script src="/uiCommon.js"></script>
  <script src="/overlay.js"></script>
</body>
</html>
